
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhagath's Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🐍 Bhagath's Snake Game</h1>

    <div id="score">Score: 0</div>

    <canvas id="gameCanvas" width="600" height="600"></canvas>

    <div id="gameOverPopup" class="popup hidden">
        <div class="popup-box">
            <h2>💀 Game Over</h2>
            <p>Your Score: <span id="finalScore">0</span></p>
            <button id="restartBtn">Play Again</button>
        </div>
    </div>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const tileSize = 30;
const tileCount = canvas.width / tileSize;

let snake;
let dx;
let dy;
let apple;
let score;
let gameRunning = true;

const popup = document.getElementById("gameOverPopup");
const finalScore = document.getElementById("finalScore");
const restartBtn = document.getElementById("restartBtn");

function startGame(){

    snake = [
        {x:10, y:10}
    ];

    dx = 1;
    dy = 0;

    score = 0;

    apple = {
        x: Math.floor(Math.random() * tileCount),
        y: Math.floor(Math.random() * tileCount)
    };

    document.getElementById("score").textContent =
        "Score: 0";

    popup.classList.add("hidden");

    gameRunning = true;
}

startGame();

document.addEventListener("keydown", changeDirection);

function changeDirection(e){

    if(e.key === "ArrowUp" && dy !== 1){
        dx = 0;
        dy = -1;
    }

    if(e.key === "ArrowDown" && dy !== -1){
        dx = 0;
        dy = 1;
    }

    if(e.key === "ArrowLeft" && dx !== 1){
        dx = -1;
        dy = 0;
    }

    if(e.key === "ArrowRight" && dx !== -1){
        dx = 1;
        dy = 0;
    }
}

function drawApple(){

    const x = apple.x * tileSize;
    const y = apple.y * tileSize;

    ctx.fillStyle = "#d62828";

    ctx.beginPath();
    ctx.arc(x + 15, y + 15, 12, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "green";
    ctx.fillRect(x + 13, y + 2, 4, 8);
}

function drawSnake(){

    snake.forEach((part,index)=>{

        const x = part.x * tileSize;
        const y = part.y * tileSize;

        if(index === 0){

            ctx.fillStyle = "#2d6a4f";

            ctx.beginPath();
            ctx.arc(x + 15, y + 15, 14, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "white";

            ctx.beginPath();
            ctx.arc(x + 10, y + 10, 3, 0, Math.PI * 2);
            ctx.arc(x + 20, y + 10, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "black";

            ctx.beginPath();
            ctx.arc(x + 10, y + 10, 1, 0, Math.PI * 2);
            ctx.arc(x + 20, y + 10, 1, 0, Math.PI * 2);
            ctx.fill();

        } else {

            ctx.fillStyle = "#52b788";

            ctx.beginPath();
            ctx.arc(x + 15, y + 15, 12, 0, Math.PI * 2);
            ctx.fill();
        }

    });
}

function moveSnake(){

    const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
    };

    if(
        head.x < 0 ||
        head.y < 0 ||
        head.x >= tileCount ||
        head.y >= tileCount
    ){
        gameOver();
        return;
    }

    for(let i=0;i<snake.length;i++){
        if(head.x === snake[i].x &&
           head.y === snake[i].y){
            gameOver();
            return;
        }
    }

    snake.unshift(head);

    if(head.x === apple.x &&
       head.y === apple.y){

        score++;

        document.getElementById("score")
        .textContent = "Score: " + score;

        apple = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
        };

    } else {
        snake.pop();
    }
}

function gameOver(){

    gameRunning = false;

    finalScore.textContent = score;

    popup.classList.remove("hidden");
}

restartBtn.addEventListener("click", startGame);

function gameLoop(){

    if(!gameRunning) return;

    moveSnake();

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawApple();
    drawSnake();
}

setInterval(gameLoop,120);

</script>

</body>
</html>
